<div class="list-container">
  <section class="list-card mat-elevation-z8">
    <header class="list-header">
      <button mat-icon-button [routerLink]="['/app/calendario']">
        <mat-icon>arrow_back</mat-icon>
      </button>

      <h2 class="list-title">Lista de recordatorios</h2>

      <div class="header-spacer"></div>
    </header>

    <div class="card-grid">
      <mat-card
        class="item-card"
        *ngFor="
          let element of dataSource.data
            | slice
              : paginator.pageIndex * paginator.pageSize
              : (paginator.pageIndex + 1) * paginator.pageSize
        "
      >
        <mat-card-header>
          <mat-card-title>{{ element.nombre }}</mat-card-title>

          <mat-card-subtitle>
            ID: {{ element.idRecordatorio }} | Tipo: {{ element.tipo }}
          </mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
          <p><strong>Fecha límite:</strong> {{ element.fechaRe | date : 'dd/MM/yyyy' }}</p>
          <p><strong>Estado:</strong> {{ element.estado.nombre || 'N/A' }}</p>
          <p><strong>Usuario:</strong> {{ element.usuario.nombre || 'N/A' }}</p>
        </mat-card-content>

        <mat-card-actions align="end">
          <button
            mat-icon-button
            class="btn-edit"
            [routerLink]="['/app/recordatorio/editar', element.idRecordatorio]"
          >
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-icon-button class="btn-delete" (click)="eliminar(element.idRecordatorio)">
            <mat-icon>delete</mat-icon>
          </button>
        </mat-card-actions>
      </mat-card>
    </div>
    <mat-paginator
      #paginator
      [length]="dataSource.data.length"
      [pageSize]="5"
      [pageSizeOptions]="[5, 10, 20]"
      showFirstLastButtons
    >
    </mat-paginator>
  </section>
</div>
