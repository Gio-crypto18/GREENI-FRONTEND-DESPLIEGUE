<div class="guia-list-container">
  <div class="table-wrapper mat-elevation-z8">
    <div class="card-header">
      <button mat-icon-button [routerLink]="['/app/guia']">
        <mat-icon>arrow_back</mat-icon>
      </button>

      <h2>Lista de Guias Favoritas</h2>
    </div>
    <table mat-table [dataSource]="dataSource" class="guia-table">
      <ng-container matColumnDef="a">
        <th mat-header-cell *matHeaderCellDef>ID.</th>
        <td mat-cell *matCellDef="let element">{{ element.guiaFavoritaId }}</td>
      </ng-container>

      <ng-container matColumnDef="b">
        <th mat-header-cell *matHeaderCellDef>Usuario</th>
        <td mat-cell *matCellDef="let element">{{ element.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="c">
        <th mat-header-cell *matHeaderCellDef>Guía</th>
        <td mat-cell *matCellDef="let element">{{ element.titulo }}</td>
      </ng-container>

      <ng-container matColumnDef="d">
        <th mat-header-cell *matHeaderCellDef>Eliminar</th>
        <td mat-cell *matCellDef="let element">
          <button
            mat-icon-button
            class="guia-btn-delete"
            (click)="eliminar(element.guiaFavoritaId)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [pageSizeOptions]="[5, 10, 20]"
      [pageSize]="5"
      showFirstLastButtons
      aria-label="Paginación de guías favoritas"
    ></mat-paginator>
  </div>
</div>
