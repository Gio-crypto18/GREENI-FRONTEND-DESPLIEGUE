<div class="tipointeraccion-list-container">
  
  <div class="table-card mat-elevation-z4">

    <header class="list-header">
      <button mat-icon-button routerLink="/app/comunidad">
        <mat-icon>arrow_back</mat-icon>
      </button>

      <h2 class="list-title">Lista de Tipos de Interacción</h2>

      <div class="header-spacer"></div>
    </header>

    <div class="table-wrapper">
      <table
        mat-table
        [dataSource]="dataSource"
        class="custom-table"
      >
        <ng-container matColumnDef="c1">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let element">
            {{ element.tipoInteraccion_Id }}
          </td>
        </ng-container>

        <ng-container matColumnDef="c2">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let element">
            {{ element.nombre }}
          </td>
        </ng-container>

        <ng-container matColumnDef="c3">
          <th mat-header-cell *matHeaderCellDef class="center-cell">Actualizar</th>
          <td mat-cell *matCellDef="let element" class="center-cell">
            <button
              mat-icon-button
              class="btn-edit" 
              [routerLink]="['/app/tipointeraccion/editar', element.tipoInteraccion_Id]"
            >
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="c4">
          <th mat-header-cell *matHeaderCellDef class="center-cell">Eliminar</th>
          <td mat-cell *matCellDef="let element" class="center-cell">
            <button
              mat-icon-button
              class="btn-delete"
              (click)="eliminar(element.tipoInteraccion_Id)"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div> <mat-paginator
      [pageSizeOptions]="[5, 10, 20]"
      [pageSize]="5"
      showFirstLastButtons
      aria-label="Paginación de Tipo"
    ></mat-paginator>

  </div> 
</div>
