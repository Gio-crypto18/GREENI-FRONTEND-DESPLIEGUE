<div class="register-container">
  <div class="register-header">
    <a href="index.html" class="logo-link">
      <img src="public/assets/img/logo-greeni.png" alt="Logo Greeni" />
    </a>
    <h2>Crea tu cuenta en Greeni</h2>
    <p>Únete a la comunidad de amantes de las plantas.</p>
  </div>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
    <div class="input-group">
      <label for="name">Nombre Completo</label>
      <input
        id="name"
        type="text"
        formControlName="name"
        placeholder="Ingresa tu nombre y apellido"
      />
    </div>

    <div class="input-group">
      <label for="email">Correo Electrónico</label>
      <input id="email" type="email" formControlName="email" placeholder="tu.correo@ejemplo.com" />
    </div>

    <div class="input-group">
      <label for="password">Crear Contraseña</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="Mínimo 8 caracteres"
      />
    </div>

    <div class="input-group">
      <label for="confirm-password">Confirmar Contraseña</label>
      <input
        id="confirm-password"
        type="password"
        formControlName="confirmPassword"
        placeholder="Repite la contraseña"
      />
    </div>

    <div class="input-group">
      <label for="reg-role">Rol</label>
      <select id="reg-role" formControlName="role">
        <option value="plantlover">Plant Lover</option>
        <option value="cientifico">Científico</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button type="submit" class="btn-register" [disabled]="isSubmitting || registerForm.invalid">
      {{ isSubmitting ? 'Registrando...' : 'Crear Cuenta' }}
    </button>
  </form>

  <div class="register-footer">
    <p>
      ¿Ya tienes una cuenta?
      <a href="login.html">Inicia sesión aquí</a>
    </p>
  </div>
</div>
