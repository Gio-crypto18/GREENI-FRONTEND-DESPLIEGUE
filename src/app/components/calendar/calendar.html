<div class="calendar-container-main">

  <h1 class="calendar-title">Calendario de Cuidado</h1>


  <div class="calendar-actions">

     <!-- Agregar Recordatorio (Admin y PlantLover) -->
<button class="btn-green"
        [routerLink]="['/app/recordatorio/agregar']"
        *ngIf="isAdmin() || isPlantLover()">
  <i class="fas fa-plus-circle"></i> Agregar Recordatorio
</button>

<!-- Listar Recordatorios (Admin y PlantLover) -->
<button class="btn-green-light"
        [routerLink]="['/app/recordatorio/listar']"
        *ngIf="isAdmin() || isPlantLover()">
  <i class="fas fa-list"></i> Listar Recordatorios
</button>

<!-- Listar Estados (Solo Admin) -->
<button class="btn-green-light"
        [routerLink]="['/app/estadorecordatorio/listar']"
        *ngIf="isAdmin()">
  <i class="fas fa-list"></i> Listar Estados
</button>

<!-- Agregar Estado (Solo Admin) -->
<button class="btn-green"
        [routerLink]="['/app/estadorecordatorio/agregar']"
        *ngIf="isAdmin()">
  <i class="fas fa-plus-circle"></i> Agregar Estado
</button>






  </div>

  <div class="calendar-grid">


    <section class="calendar-card">
      <full-calendar [options]="calendarOptions"></full-calendar>
    </section>

    <section class="recordatorios-card">

      <div class="recordatorios-header">
        <h3>Recordatorios</h3>

        <div class="recordatorio-actions">
          <input type="text" placeholder="Buscar…" (input)="filterReminders($event)">
          <select (change)="filterByStatus($event)">
            <option value="all">Todos</option>
            <option value="pending">Pendientes</option>
            <option value="completed">Completados</option>
          </select>
        </div>
      </div>

      <ul class="recordatorio-list">
        <li *ngFor="let reminder of filteredReminders"
            class="recordatorio-item"
            (click)="editReminder(reminder)">

          <div class="recordatorio-main">
            <span class="title">{{ reminder.title }}</span>
            <span class="date">{{ formatDate(reminder.datetime) }}</span>
          </div>

          <div class="recordatorio-meta">
            <span class="tag">{{ reminder.type }}</span>
            <button class="delete-btn"
                    (click)="deleteReminder(reminder.id); $event.stopPropagation()">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </li>
      </ul>

      <div *ngIf="filteredReminders.length === 0" class="empty-msg">
        <i class="fas fa-calendar-plus"></i>
        <p>No hay recordatorios</p>
      </div>

    </section>

  </div>
</div>


<div class="modal-backdrop" [class.show]="showModal">
  <div class="modal-container">

    <div class="modal-header">
      <h3>{{ editingReminder ? 'Editar Recordatorio' : 'Nuevo Recordatorio' }}</h3>
      <button class="close-btn" (click)="closeModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <form [formGroup]="reminderForm" (submit)="saveReminder()" class="modal-body">

      <div class="form-group">
        <label>Título</label>
        <input formControlName="title" type="text" required>
      </div>

      <div class="form-group">
        <label>Fecha y Hora</label>
        <input formControlName="datetime" type="datetime-local" required>
      </div>

      <div class="form-group">
        <label>Tipo</label>
        <select formControlName="type">
          <option value="Riego">Riego</option>
          <option value="Fertilizar">Fertilizar</option>
          <option value="Poda">Poda</option>
          <option value="Revisión">Revisión</option>
          <option value="Otro">Otro</option>
        </select>
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select formControlName="status">
          <option value="pending">Pendiente</option>
          <option value="completed">Completado</option>
        </select>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-gray" (click)="closeModal()">Cancelar</button>
        <button type="submit" class="btn-green">Guardar</button>
      </div>

    </form>
  </div>
</div>
