<div class="list-container">
  <section class="list-card mat-elevation-z8">
    <header class="list-header">
      <button mat-icon-button [routerLink]="['/app/mis-plantas']">
        <mat-icon>arrow_back</mat-icon>
      </button>

      <h2 class="list-title">Lista de especies</h2>

      <div class="header-spacer"></div>
    </header>

    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" class="data-table">
        <ng-container matColumnDef="c1">
          <th mat-header-cell *matHeaderCellDef>ID.</th>
          <td mat-cell *matCellDef="let element">{{ element.idEspecie }}</td>
        </ng-container>

        <ng-container matColumnDef="c2">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let element">{{ element.nombreC }}</td>
        </ng-container>

        

        <ng-container matColumnDef="c4">
          <th mat-header-cell *matHeaderCellDef class="center-cell">Eliminar</th>
          <td mat-cell *matCellDef="let element" class="center-cell">
            <button
              mat-icon-button
              class="btn-delete"
              (click)="eliminar(element.idEspecie)"
              aria-label="Eliminar especie"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>

    <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons>
    </mat-paginator>
  </section>
</div>
