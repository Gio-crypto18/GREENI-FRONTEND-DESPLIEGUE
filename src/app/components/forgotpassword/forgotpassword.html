<div class="login-page">
  <div class="login-container">
    <div *ngIf="step === 'check'" id="check-email-section">
      <div class="login-header">
        <a routerLink="/" class="logo-link">
          <img src="assets/logo-greeni.png" alt="Logo Greeni" />
        </a>
        <h2>Recupera tu Acceso</h2>
        <p>Ingresa tu correo para verificar tu cuenta.</p>
      </div>

      <form id="checkEmailForm" class="login-form" (ngSubmit)="onCheckEmailSubmit()">
        <div class="input-group">
          <label for="email">Correo Electrónico</label>
          <div class="input-with-icon">
            <i class="fas fa-envelope"></i>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="email"
              placeholder="tu.correo@ejemplo.com"
              required
            />
          </div>
        </div>

        <p id="check-error-message" class="error-message">
          {{ checkErrorMessage }}
        </p>

        <button type="submit" class="btn-login">Verificar Correo</button>
      </form>
    </div>

    <div *ngIf="step === 'reset'" id="reset-password-section">
      <div class="login-header">
        <a routerLink="/" class="logo-link">
          <img src="assets/logo-greeni.png" alt="Logo Greeni" />
        </a>
        <h2>Crea tu nueva contraseña</h2>
        <p>Asegúrate de que sea segura y fácil de recordar.</p>
      </div>

      <form id="resetPasswordForm" class="login-form" (ngSubmit)="onResetPasswordSubmit()">
        <div class="input-group">
          <label for="new-password">Nueva Contraseña</label>
          <div class="input-with-icon">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="new-password"
              [(ngModel)]="newPassword"
              name="newPassword"
              placeholder="Mínimo 8 caracteres"
              required
            />
          </div>
        </div>

        <div class="input-group">
          <label for="confirm-password">Confirmar Nueva Contraseña</label>
          <div class="input-with-icon">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="confirm-password"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="Repite la contraseña"
              required
            />
          </div>
        </div>

        <p id="reset-error-message" class="error-message">
          {{ resetErrorMessage }}
        </p>

        <button type="submit" class="btn-login">Cambiar Contraseña</button>
      </form>
    </div>

    <div class="login-footer">
      <p><a routerLink="/login">Volver a Iniciar Sesión</a></p>
    </div>
  </div>
</div>
