<div class="app-shell">
  <aside class="app-sidebar">
    <div class="brand">
      <span class="logo-icon">🌿</span>
      <span class="logo-text">Greeni</span>
    </div>

    <nav class="menu">
<!-- Home (todos) -->
<a routerLink="/app/home" routerLinkActive="active" class="menu-item">
  <span>Home</span>
</a>

<!-- Mis plantas (todos) -->
<a routerLink="/app/mis-plantas" routerLinkActive="active" class="menu-item">
  <span>Mis plantas</span>
</a>

<!-- Diagnóstico (todos) -->
<a routerLink="/app/diagnostico" routerLinkActive="active" class="menu-item">
  <span>Diagnóstico</span>
</a>

<!-- Calendario (solo Admin y Plantlover) -->
<a
  routerLink="/app/calendario"
  routerLinkActive="active"
  class="menu-item"
  *ngIf="isAdmin() || isPlantLover()"
>
  <span>Calendario</span>
</a>

<!-- Mis Guías (todos) -->
<a
  routerLink="/app/guia"
  routerLinkActive="active"
  class="menu-item"
>
  <span>Mis Guías</span>
</a>


<!-- Comunidad (solo Admin y Plantlover) -->
<a
  routerLink="/app/comunidad"
  routerLinkActive="active"
  class="menu-item"
  *ngIf="isAdmin() || isPlantLover()"
>
  <span>Comunidad</span>
</a>

<!-- Mi Perfil (todos) -->
<a routerLink="/app/perfil" routerLinkActive="active" class="menu-item">
  <span>Mi Perfil</span>
</a>

<!-- Panel de control (solo Admin) -->
<a
  routerLink="/app/reportes"
  routerLinkActive="active"
  class="menu-item"
  *ngIf="isAdmin()"
>
  <span>Panel de Control</span>
</a>
    </nav>

   <div class="sidebar-footer">
  <div class="logout-section">
    
    <!-- Menú de usuario -->
    <button mat-button [matMenuTriggerFor]="menuUsuario" class="user-menu-btn">
      <mat-icon>account_circle</mat-icon>
      <span>Usuario</span>
    </button>
    
    <mat-menu #menuUsuario="matMenu">
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Cerrar sesión</span>
      </button>
      <button mat-menu-item disabled>
        <mat-icon>person</mat-icon>
        <span>Rol: {{ role }}</span>
      </button>
    </mat-menu>

  </div>
</div>
  </aside>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>
